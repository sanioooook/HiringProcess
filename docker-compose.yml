services:

  # PostgreSQL
  postgres:
    image: postgres:17-alpine
    container_name: hp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hiringprocess
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432" # expose for local tools (pgAdmin, DBeaver)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hp_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=hiringprocess;Username=postgres;Password=${POSTGRES_PASSWORD:-postgres}"
      Jwt__Secret: ${JWT_SECRET:-change-me-in-production-32-chars!!}
      Jwt__Issuer: hiringprocess-api
      Jwt__Audience: hiringprocess-frontend
      Jwt__ExpireMinutes: 60
      Authentication__Google__ClientId: ${GOOGLE_CLIENT_ID:-}
      FileStorage__BasePath: /app/uploads
      Cors__AllowedOrigins__0: ${APP_FRONTEND_URL:-http://localhost}
      Resend__ApiKey: ${RESEND_API_KEY:-}
      Resend__FromEmail: ${RESEND_FROM_EMAIL:-noreply@example.com}
      App__FrontendUrl: ${APP_FRONTEND_URL:-http://localhost:4200}
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "5000:8080" # expose for local dev without nginx
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend (Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hp_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      APP_FRONTEND_URL: ${APP_FRONTEND_URL:-http://localhost}
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  uploads_data:
