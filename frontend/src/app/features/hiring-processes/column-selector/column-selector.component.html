<h2 mat-dialog-title>{{ 'colSelector.title' | translate }}</h2>
<mat-dialog-content>
  <div class="col-list">
    @for (col of data.columns; track col.key) {
      <div class="col-item">
        <mat-checkbox [(ngModel)]="col.visible"
                      [disabled]="col.key === 'companyName' || col.key === 'actions'">
          {{ col.labelKey | translate }}
        </mat-checkbox>
      </div>
    }
  </div>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">{{ 'colSelector.cancel' | translate }}</button>
  <button mat-flat-button color="primary" (click)="apply()">{{ 'colSelector.apply' | translate }}</button>
</mat-dialog-actions>
