<h2 mat-dialog-title>Manage Columns</h2>
<mat-dialog-content>
  <div class="col-list">
    @for (col of data.columns; track col.key) {
      <div class="col-item">
        <mat-checkbox [(ngModel)]="col.visible"
                      [disabled]="col.key === 'companyName' || col.key === 'actions'">
          {{ col.label }}
        </mat-checkbox>
      </div>
    }
  </div>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
  <button mat-flat-button color="primary" (click)="apply()">Apply</button>
</mat-dialog-actions>
